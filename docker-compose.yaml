services:
  db:
    image: postgres:14.2-alpine
    container_name: "ns-postgres-sb"
    restart: "no"
    networks:
      - ns-network
    ports:
      - "5432:5432"
    volumes:
      - $HOME/docker/volumes/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: "123456"
      POSTGRES_USER: "ns_user"
      POSTGRES_DB: "news_service"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ns_user -d news_service"]
      interval: 10s
      timeout: 5s
      retries: 5

  news_service:
    image: news_service
    build: .
    container_name: "news-service"
    restart: "on-failure"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ns-network
    ports:
      - "8080:8080"
    environment:
      DB_HOSTNAME: db
      DB_NAME: news_service
      DB_PASSWORD: 123456
      DB_PORT: 5432
      DB_USER: ns_user
    healthcheck:
      test: "curl --fail --silent localhost:8080/actuator/health | grep UP || exit 1"
      interval: 20s
      timeout: 5s
      retries: 5

networks:
  ns-network: